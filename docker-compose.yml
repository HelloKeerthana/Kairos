services:
  postgres:
    image: postgres:16
    container_name: kairos-postgres
    environment:
      POSTGRES_USER: kairos
      POSTGRES_PASSWORD: kairos_pass
      POSTGRES_DB: kairos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: